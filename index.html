<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">

</head>
<body>
    <div class="contenedor">

        <div class="contenedor-display-input">
            <input type="text" class="display-input" id="display" placeholder="Insertar Ecuacion">
        </div>
        <div>
            <div class="botones">
                <button id="sin" class="boton">SIN</button>
                <button id="cos" class="boton">COS</button>
                <button id="tan" class="boton">TAN</button>
                <button id="expo" class="boton">^</button>
                <button id="raiz" class="boton">&Sqrt;</button>
                <button id="7" class="boton">7</button>
                <button id="8" class="boton">8</button>
                <button id="9" class="boton">9</button>
                <button id="DEL" class="boton">DEL</button>
                <button id="AC" class="boton">AC</button>
                <button id="4" class="boton">4</button>
                <button id="5" class="boton">5</button>
                <button id="6" class="boton">6</button>
                <button id="multiplicar" class="boton">X</button>
                <button id="dividir" class="boton">&divide;</button>
                <button id="1" class="boton">1</button>
                <button id="2" class="boton">2</button>
                <button id="3" class="boton">3</button>
                <button id="sumar" class="boton">+</button>
                <button id="restar" class="boton">-</button>
                <button id="0" class="boton">0</button>
                <button id="coma" class="boton">.</button>
                <button id="" class="boton"></button>
                <button id="ANS" class="boton">ANS</button>
                <button id="igual" class="boton">=</button>
            </div>
        </div>
    </div>
<script src="script/script.js"></script>
</body>
</html>
