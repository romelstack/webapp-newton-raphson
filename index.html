<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style/style.css">
    <script src="app.js"></script>
</head>
<body>
    <div class="contenedor">
        <div class="contenedor-calculadora">
            <div class="contenedor-input">
                <h2>Calculadora de Raíces de Funciones</h2>
                <label for="input-ec">Ingrese la ecuación a calcular:</label>
                <div class="contenedor-ec">
                    <input id="input-ec" type="text" class="input-ecuacion">
                    <button id="boton-calcular" class="boton-calcular">Calcular</button>
                </div>
                
                <div class="teclado">
                    <button id="sin" class="boton-calculadora">SIN</button>
                    <button id="cos" class="boton-calculadora">COS</button>
                    <button id="tan" class="boton-calculadora">TAN</button>
                    <button id="expo" class="boton-calculadora">^</button>
                    <button id="raiz" class="boton-calculadora">&Sqrt;</button>
                    <button id="7" class="boton-calculadora">7</button>
                    <button id="8" class="boton-calculadora">8</button>
                    <button id="9" class="boton-calculadora">9</button>
                    <button id="DEL" class="boton-calculadora">DEL</button>
                    <button id="AC" class="boton-calculadora">AC</button>
                    <button id="4" class="boton-calculadora">4</button>
                    <button id="5" class="boton-calculadora">5</button>
                    <button id="6" class="boton-calculadora">6</button>
                    <button id="multiplicar" class="boton-calculadora">*</button>
                    <button id="dividir" class="boton-calculadora">&divide;</button>
                    <button id="1" class="boton-calculadora">1</button>
                    <button id="2" class="boton-calculadora">2</button>
                    <button id="3" class="boton-calculadora">3</button>
                    <button id="sumar" class="boton-calculadora">+</button>
                    <button id="restar" class="boton-calculadora">-</button>
                    <button id="0" class="boton-calculadora">0</button>
                    <button id="coma" class="boton-calculadora">.</button>
                    <button id="parentesis-cerrado" class="boton-calculadora">)</button>
                    <button id="euler" class="boton-calculadora">e</button>
                    <button id="igual" class="boton-calculadora">=</button>
                    <button id="izquierda" class="boton-calculadora boton-izquierda"><</button>
                    <button id="x" class="boton-calculadora">x</button>
                    <button id="derecha" class="boton-calculadora boton-derecha">></button>
                </div>
            </div>
            
            <div class="contenedor-resultado">
    
            </div>
        </div>

            
        </div>
        <script src="script.js"></script>
        <script src="calculadora.js"></script>
    </body>
    </html>
